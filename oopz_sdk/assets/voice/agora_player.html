<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Agora Player</title>
</head>
<body>
<script>
/**
 * Oopz voice browser backend page.
 *
 * Important mapping observed from the real client:
 * - Agora Web SDK joins with mode="live", role="host", codec="vp8".
 * - Oopz voice API data.supplierSign is the play_urlAgora token/channel_key.
 * - Oopz voice API data.roomId is the Agora channelName.
 * - The Oopz API data.appId may be 0; do not use it as Agora app id.
 * - data_stream payload uses:
 *     uid = Oopz internal string uid, e.g. 6ad0261bc4eb41e882692531981a0972
 *     cid = Agora numeric uid returned/used by join, e.g. 374010679
 *     m   = mic muted flag: 0 active, 1 muted
 *     hm  = speaker/deafen flag: 0 normal, 1 muted/deafened
 */

/* -------------------- WebSocket capture for data_stream bridge -------------------- */

const _wsInstances = [];
const _OrigWS = window.WebSocket;

window.WebSocket = function(url, protocols) {
  const ws = protocols ? new _OrigWS(url, protocols) : new _OrigWS(url);
  _wsInstances.push(ws);

  ws.addEventListener("open", () => {
    console.log("[WS open]", url);
  });

  ws.addEventListener("close", (ev) => {
    console.log("[WS close]", url, ev.code, ev.reason);
  });

  ws.addEventListener("error", () => {
    console.log("[WS error]", url);
  });

  return ws;
};

window.WebSocket.prototype = _OrigWS.prototype;
window.WebSocket.CONNECTING = _OrigWS.CONNECTING;
window.WebSocket.OPEN = _OrigWS.OPEN;
window.WebSocket.CLOSING = _OrigWS.CLOSING;
window.WebSocket.CLOSED = _OrigWS.CLOSED;

function getAgoraSignalWs() {
  const edgeWs = _wsInstances.find((w) =>
    w.readyState === WebSocket.OPEN &&
    typeof w.url === "string" &&
    w.url.includes("edge.sd-rtn.com")
  );

  if (edgeWs) return edgeWs;
  return _wsInstances.find((w) => w.readyState === WebSocket.OPEN) || null;
}

async function waitForAgoraSignalWs(timeoutMs = 3000) {
  const start = performance.now();

  while (performance.now() - start < timeoutMs) {
    const ws = getAgoraSignalWs();
    if (ws) return ws;
    await new Promise((resolve) => setTimeout(resolve, 50));
  }

  return null;
}

window.agoraWsUrls = () => _wsInstances.map((w) => ({
  url: w.url,
  readyState: w.readyState,
}));

/* -------------------- Agora SDK loader -------------------- */

async function loadAgoraSdk() {
  if (typeof AgoraRTC !== "undefined") return;

  const sdkUrl =
    window.AGORA_SDK_URL ||
    "https://download.agora.io/sdk/release/AgoraRTC_N.js";

  await new Promise((resolve, reject) => {
    const script = document.createElement("script");
    script.src = sdkUrl;
    script.onload = () => resolve();
    script.onerror = () => reject(new Error(`failed to load Agora SDK: ${sdkUrl}`));
    document.head.appendChild(script);
  });
}

/* -------------------- Audio decode context -------------------- */

let decodeAudioContext = null;

function getDecodeAudioContext() {
  if (!decodeAudioContext) {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) {
      throw new Error("AudioContext is not supported in this browser");
    }
    decodeAudioContext = new Ctx();
  }
  return decodeAudioContext;
}

async function decodeBase64ToAudioBuffer(base64Data) {
  const binary = atob(base64Data);
  const bytes = new Uint8Array(binary.length);

  for (let i = 0; i < binary.length; i++) {
    bytes[i] = binary.charCodeAt(i);
  }

  const arrayBuffer = bytes.buffer.slice(
    bytes.byteOffset,
    bytes.byteOffset + bytes.byteLength
  );

  const audioContext = getDecodeAudioContext();
  return await audioContext.decodeAudioData(arrayBuffer);
}

/* -------------------- Global runtime state -------------------- */

let client = null;
let _state = "idle";
let _playGen = 0;

let currentAgoraUid = null;
let currentOopzUid = null;
let currentMicMuted = false;
let currentSpeakerMuted = false;

let activePlayback = null;

window.agoraReady = () => typeof AgoraRTC !== "undefined";
window.agoraState = () => _state;

function setState(nextState) {
  _state = nextState;
}

function shortId() {
  return Math.random().toString(16).slice(2, 8).padEnd(6, "0");
}

function getCurrentTrack() {
  return activePlayback ? activePlayback.track : null;
}

function isCurrentPlayback(playback) {
  return !!playback &&
    !!activePlayback &&
    playback.gen === activePlayback.gen &&
    playback.track === activePlayback.track;
}

/* -------------------- Voice state bridge -------------------- */

function buildVoiceStatePayload(oopzUid, agoraUid, micMuted, speakerMuted) {
  return {
    m: micMuted ? 1 : 0,
    uid: String(oopzUid),
    cid: Number(agoraUid),
    hm: speakerMuted ? 1 : 0,
  };
}

async function sendVoiceStateRaw(oopzUid, agoraUid, micMuted, speakerMuted, repeat = 2) {
  const ws = await waitForAgoraSignalWs(3000);

  if (!ws) {
    return { ok: false, error: "no open agora ws" };
  }

  if (!oopzUid) {
    return { ok: false, error: "oopzUid is required" };
  }

  if (agoraUid === null || agoraUid === undefined || Number.isNaN(Number(agoraUid))) {
    return { ok: false, error: "valid agoraUid is required" };
  }

  try {
    const statePayload = buildVoiceStatePayload(
      oopzUid,
      agoraUid,
      micMuted,
      speakerMuted
    );

    const payload = btoa(JSON.stringify(statePayload));
    const sendTs = Math.floor(performance.now());

    for (let i = 0; i < repeat; i++) {
      ws.send(
        JSON.stringify({
          _id: shortId(),
          _type: "data_stream",
          _message: {
            payload,
            syncWithAudio: false,
            sendTs: sendTs + i * 2,
          },
        })
      );
    }

    console.log("[voice state]", statePayload, "ws=", ws.url);

    return {
      ok: true,
      ws: ws.url,
      payload: statePayload,
    };
  } catch (e) {
    return { ok: false, error: e?.message || String(e) };
  }
}

async function sendCurrentVoiceState(repeat = 2) {
  if (!currentOopzUid || currentAgoraUid === null || currentAgoraUid === undefined) {
    return {
      ok: false,
      error: "voice identity is not ready",
      currentOopzUid,
      currentAgoraUid,
    };
  }

  return await sendVoiceStateRaw(
    currentOopzUid,
    currentAgoraUid,
    currentMicMuted,
    currentSpeakerMuted,
    repeat
  );
}

window.agoraSetVoiceIdentity = async (oopzUid, agoraUid = currentAgoraUid) => {
  currentOopzUid = oopzUid || currentOopzUid;

  if (agoraUid !== undefined && agoraUid !== null) {
    currentAgoraUid = Number(agoraUid);
  }

  return await sendCurrentVoiceState(2);
};

window.agoraSetVoiceState = async (micMuted, speakerMuted = currentSpeakerMuted) => {
  currentMicMuted = !!micMuted;
  currentSpeakerMuted = !!speakerMuted;
  return await sendCurrentVoiceState(2);
};

// Compatibility with older Python calls.
window.agoraSendIdentity = async (oopzUid, agoraUid = currentAgoraUid) => {
  currentOopzUid = oopzUid || currentOopzUid;

  if (agoraUid !== undefined && agoraUid !== null) {
    currentAgoraUid = Number(agoraUid);
  }

  return await sendCurrentVoiceState(2);
};

/* -------------------- Track cleanup helpers -------------------- */

async function unpublishTrackSafely(track) {
  if (!track || !client) return;
  try {
    await client.unpublish([track]);
  } catch (_) {}
}

function closeTrackSafely(track) {
  if (!track) return;
  try {
    track.close();
  } catch (_) {}
}

function stopProcessAudioBufferSafely(track) {
  if (!track) return;
  try {
    track.stopProcessAudioBuffer();
  } catch (_) {}
}

async function cleanupPlaybackResources(
  playback,
  { stopProcessing = true, unpublish = true } = {}
) {
  if (!playback) return;

  const { track } = playback;

  if (stopProcessing) {
    stopProcessAudioBufferSafely(track);
  }

  if (unpublish) {
    await unpublishTrackSafely(track);
  }

  closeTrackSafely(track);
}

async function stopCurrentPlayback({ bumpGen = true, nextState = "joined" } = {}) {
  const playback = activePlayback;

  if (bumpGen) {
    _playGen += 1;
  }

  activePlayback = null;

  if (playback) {
    await cleanupPlaybackResources(playback, {
      stopProcessing: true,
      unpublish: true,
    });
  }

  setState(nextState);
}

async function finalizeStoppedPlayback(playback) {
  if (!isCurrentPlayback(playback)) {
    return;
  }

  activePlayback = null;

  await cleanupPlaybackResources(playback, {
    stopProcessing: false,
    unpublish: true,
  });

  if (playback.gen === _playGen) {
    setState("joined");
  }
}

function bindPlaybackEvents(playback) {
  const { track, gen } = playback;

  track.on("source-state-change", (st) => {
    if (!isCurrentPlayback(playback)) return;
    if (gen !== _playGen) return;

    console.log("[source-state-change]", st);

    if (st === "playing") {
      setState("playing");
      return;
    }

    if (st === "paused") {
      setState("paused");
      return;
    }

    if (st === "stopped") {
      setState("finished");
      void finalizeStoppedPlayback(playback);
    }
  });
}

function makePlayback(track) {
  return {
    gen: _playGen,
    track,
  };
}

/* -------------------- Join / Leave -------------------- */

window.agoraJoin = async (appId, token, channelName, uid) => {
  try {
    await loadAgoraSdk();

    if (client) {
      await window.agoraLeave();
    }

    client = AgoraRTC.createClient({
      mode: "live",
      codec: "vp8",
    });

    await client.setClientRole("host");

    const expectedUid = uid === null || uid === undefined ? null : Number(uid);

    const assignedUid = await client.join(
      String(appId),
      String(channelName),
      token || null,
      expectedUid
    );

    currentAgoraUid = Number(assignedUid);

    if (expectedUid !== null && currentAgoraUid !== expectedUid) {
      console.warn(
        "[Agora uid mismatch]",
        "expected=", expectedUid,
        "assigned=", currentAgoraUid
      );
    }
    setState("joined");

    return {
      ok: true,
      uid: currentAgoraUid,
    };
  } catch (e) {
    return { ok: false, error: e?.message || String(e) };
  }
};

window.agoraLeave = async () => {
  await stopCurrentPlayback({ bumpGen: true, nextState: "joined" });

  if (client) {
    try {
      await client.leave();
    } catch (_) {}
    client = null;
  }

  currentAgoraUid = null;
  setState("idle");
};

/* -------------------- Playback core -------------------- */

async function publishTrackAsPlayback(localTrack, gen) {
  if (gen !== _playGen) {
    closeTrackSafely(localTrack);
    return { ok: false, error: "superseded" };
  }

  const playback = makePlayback(localTrack);
  activePlayback = playback;
  bindPlaybackEvents(playback);

  localTrack.startProcessAudioBuffer({ loop: false });
  await client.publish([localTrack]);

  // After publish, refresh identity/state again. This matches the real client more closely.
  // publish 成功后，补发一次 uid/cid + 当前 m/hm 状态。
  // 此时 Agora signaling WS 通常已经存在。
  await sendCurrentVoiceState(2);

  if (!isCurrentPlayback(playback) || gen !== _playGen) {
    await cleanupPlaybackResources(playback, {
      stopProcessing: true,
      unpublish: true,
    });
    return { ok: false, error: "superseded" };
  }

  setState("playing");

  return {
    ok: true,
    duration: localTrack.duration,
    agoraUid: currentAgoraUid,
  };
}

window.agoraPlayAudio = async (url) => {
  const gen = ++_playGen;
  let localTrack = null;

  try {
    await loadAgoraSdk();

    if (!client) {
      return { ok: false, error: "not joined" };
    }

    await stopCurrentPlayback({ bumpGen: false, nextState: "joined" });

    localTrack = await AgoraRTC.createBufferSourceAudioTrack({
      source: url,
      cacheOnlineFile: false,
    });

    return await publishTrackAsPlayback(localTrack, gen);
  } catch (e) {
    if (localTrack) {
      await cleanupPlaybackResources({ gen, track: localTrack }, {
        stopProcessing: true,
        unpublish: true,
      });
    }

    if (activePlayback && activePlayback.track === localTrack) {
      activePlayback = null;
    }

    if (gen !== _playGen) {
      return { ok: false, error: "superseded" };
    }
    setState(client ? "joined" : "idle");
    return { ok: false, error: e?.message || String(e) };
  }
};

window.agoraPlayLocal = async (base64Data, mimeType) => {
  const gen = ++_playGen;
  let localTrack = null;

  try {
    await loadAgoraSdk();

    if (!client) {
      return { ok: false, error: "not joined" };
    }

    await stopCurrentPlayback({ bumpGen: false, nextState: "joined" });

    const audioBuffer = await decodeBase64ToAudioBuffer(base64Data);

    if (gen !== _playGen) {
      return { ok: false, error: "superseded" };
    }

    localTrack = await AgoraRTC.createBufferSourceAudioTrack({
      source: audioBuffer,
      cacheOnlineFile: false,
    });

    return await publishTrackAsPlayback(localTrack, gen);
  } catch (e) {
    if (localTrack) {
      await cleanupPlaybackResources({ gen, track: localTrack }, {
        stopProcessing: true,
        unpublish: true,
      });
    }

    if (activePlayback && activePlayback.track === localTrack) {
      activePlayback = null;
    }

    if (gen !== _playGen) {
      return { ok: false, error: "superseded" };
    }

    setState(client ? "joined" : "idle");
    return { ok: false, error: e?.message || String(e) };
  }
};

window.agoraStopAudio = async () => {
  await stopCurrentPlayback({ bumpGen: true, nextState: "joined" });
};

/* -------------------- Playback controls -------------------- */

window.agoraPause = () => {
  const track = getCurrentTrack();
  if (!track || _state !== "playing") {
    return { ok: false, error: "not playing" };
  }

  try {
    track.pauseProcessAudioBuffer();
    setState("paused");
    return { ok: true };
  } catch (e) {
    return { ok: false, error: e?.message || String(e) };
  }
};

window.agoraResume = () => {
  const track = getCurrentTrack();
  if (!track || _state !== "paused") {
    return { ok: false, error: "not paused" };
  }

  try {
    track.resumeProcessAudioBuffer();
    setState("playing");
    return { ok: true };
  } catch (e) {
    return { ok: false, error: e?.message || String(e) };
  }
};

window.agoraSeek = (time) => {
  const track = getCurrentTrack();
  if (!track) {
    return { ok: false, error: "no track" };
  }

  try {
    track.seekAudioBuffer(time);
    return { ok: true };
  } catch (e) {
    return { ok: false, error: e?.message || String(e) };
  }
};

window.agoraSetVolume = (vol) => {
  const track = getCurrentTrack();
  if (!track) {
    return { ok: false, error: "no track" };
  }

  try {
    track.setVolume(Math.max(0, Math.min(100, Number(vol))));
    return { ok: true };
  } catch (e) {
    return { ok: false, error: e?.message || String(e) };
  }
};

window.agoraGetCurrentTime = () => {
  const track = getCurrentTrack();
  if (!track) return 0;

  try {
    return track.getCurrentTime();
  } catch (_) {
    return 0;
  }
};

/* -------------------- Debug status -------------------- */

window.agoraGetStatus = () => {
  const track = getCurrentTrack();

  let currentTime = 0;
  let duration = 0;

  try {
    currentTime = track ? track.getCurrentTime() : 0;
  } catch (_) {}

  try {
    duration = track ? track.duration : 0;
  } catch (_) {}

  return {
    state: _state,
    hasClient: !!client,
    currentOopzUid,
    currentAgoraUid,
    currentMicMuted,
    currentSpeakerMuted,
    hasTrack: !!track,
    currentTime,
    duration,
    ws: window.agoraWsUrls(),
  };
};
</script>
</body>
</html>
